name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-latest
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Materialize Tauri icon
        run: npm run tauri:icon

      # Import Apple Developer certificate and export signing env vars only when secrets are present.
      # When APPLE_CERTIFICATE is absent, none of the signing env vars are set, so Tauri skips codesign.
      - name: Import signing certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm certificate.p12

      - name: Export Apple signing env vars
        if: env.APPLE_CERTIFICATE != ''
        run: |
          echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}" >> "$GITHUB_ENV"
          echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> "$GITHUB_ENV"
          echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> "$GITHUB_ENV"

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Noetica ${{ github.ref_name }}"
          releaseBody: |
            ## Noetica ${{ github.ref_name }}

            Install via Homebrew:
            ```
            brew install --cask SocioProphet/tap/noetica
            ```

            Or download the dmg below and open it.
          releaseDraft: true
          prerelease: false

  update-homebrew-cask:
    needs: release-macos
    runs-on: ubuntu-latest
    # Only run when the TAP_GITHUB_TOKEN secret is available
    if: ${{ vars.TAP_REPO != '' }}
    steps:
      - name: Wait for release asset propagation
        run: sleep 45

      - name: Resolve dmg URL and SHA256
        id: asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ needs.release-macos.outputs.version }}
          TAG=${{ github.ref_name }}
          # Find the dmg asset in the draft release
          DMG_URL=$(gh release view "$TAG" \
            --repo "${{ github.repository }}" \
            --json assets \
            --jq '.assets[] | select(.name | endswith(".dmg")) | .url' \
            | head -1)
          if [ -z "$DMG_URL" ]; then
            echo "No dmg asset found — skipping tap update"
            exit 0
          fi
          curl -sL "$DMG_URL" -o noetica.dmg
          SHA256=$(shasum -a 256 noetica.dmg | awk '{print $1}')
          echo "url=$DMG_URL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.TAP_REPO }}
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Update Cask formula
        run: |
          FILE=tap/Casks/noetica.rb
          VERSION=${{ steps.asset.outputs.version }}
          SHA256=${{ steps.asset.outputs.sha256 }}
          URL=${{ steps.asset.outputs.url }}
          sed -i "s|version \".*\"|version \"$VERSION\"|g" "$FILE"
          sed -i "s|sha256 \".*\"|sha256 \"$SHA256\"|g" "$FILE"
          sed -i "s|url \".*\"|url \"$URL\"|g" "$FILE"

      - name: Commit and push tap update
        working-directory: tap
        run: |
          git config user.name "noetica-bot"
          git config user.email "noetica-bot@users.noreply.github.com"
          git add Casks/noetica.rb
          git commit -m "noetica ${{ steps.asset.outputs.version }}"
          git push
