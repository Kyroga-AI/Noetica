name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-latest
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Materialize Tauri icon
        run: npm run tauri:icon

      # ── Sidecar binaries ───────────────────────────────────────────────────
      # Build agent-machine and download Ollama before tauri build so that
      # externalBin entries resolve correctly when Tauri bundles the app.

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build agent-machine binary
        run: npm run agent-machine:build:binary

      - name: Download Ollama sidecar
        env:
          OLLAMA_VERSION: "0.30.8"
        run: bash scripts/download-sidecars.sh

      # ── Code signing ───────────────────────────────────────────────────────
      # Import Apple Developer certificate when the secret is present.
      # When absent, tauri build proceeds unsigned and we ad-hoc sign afterward.

      - name: Import signing certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm certificate.p12

      - name: Export Apple signing env vars
        if: env.APPLE_CERTIFICATE != ''
        run: |
          echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}" >> "$GITHUB_ENV"
          echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> "$GITHUB_ENV"
          echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> "$GITHUB_ENV"

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOETICA_STATIC_EXPORT: "1"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Noetica ${{ github.ref_name }}"
          releaseBody: |
            ## Noetica ${{ github.ref_name }}

            Install via Homebrew:
            ```sh
            brew tap SocioProphet/noetica https://github.com/SocioProphet/Noetica
            brew install --cask noetica
            ```

            Or download the .dmg below and open it.
          releaseDraft: false
          prerelease: false

      # Ad-hoc sign the DMG when no Apple Developer cert is available.
      # This removes the broken signature that Gatekeeper silently rejects.
      - name: Ad-hoc sign DMG (no cert fallback)
        if: env.APPLE_CERTIFICATE == ''
        run: |
          DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          if [ -n "$DMG" ]; then
            echo "Ad-hoc signing: $DMG"
            # Mount, strip broken sig from app, re-sign ad-hoc, repack
            MOUNT=$(hdiutil attach "$DMG" -nobrowse -quiet | awk '/Apple_HFS/ {print $NF}')
            APP=$(find "$MOUNT" -name "*.app" -maxdepth 1 | head -1)
            codesign --remove-signature "$APP" || true
            codesign --force --deep --sign - "$APP"
            hdiutil detach "$MOUNT" -quiet
            echo "Ad-hoc signing complete"
          fi

  update-cask:
    needs: release-macos
    runs-on: ubuntu-latest
    steps:
      - name: Wait for release asset propagation
        run: sleep 60

      - name: Resolve DMG download URL and SHA256
        id: asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ needs.release-macos.outputs.version }}
          TAG=${{ github.ref_name }}

          # Use browserDownloadUrl (the actual CDN download URL, not the API URL)
          DMG_URL=$(gh release view "$TAG" \
            --repo "${{ github.repository }}" \
            --json assets \
            --jq '.assets[] | select(.name | endswith(".dmg")) | .browserDownloadUrl' \
            | head -1)

          if [ -z "$DMG_URL" ]; then
            echo "No dmg asset found — skipping cask update"
            exit 0
          fi

          curl -fsSL "$DMG_URL" -o noetica.dmg
          SHA256=$(shasum -a 256 noetica.dmg | awk '{print $1}')
          echo "url=$DMG_URL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "DMG URL: $DMG_URL"
          echo "SHA256:  $SHA256"

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Casks/noetica.rb
        run: |
          FILE=Casks/noetica.rb
          VERSION=${{ steps.asset.outputs.version }}
          SHA256=${{ steps.asset.outputs.sha256 }}
          URL=${{ steps.asset.outputs.url }}
          sed -i "s|version \".*\"|version \"$VERSION\"|g" "$FILE"
          sed -i "s|sha256 \".*\"|sha256 \"$SHA256\"|g" "$FILE"
          sed -i "s|url \".*\"|url \"$URL\"|g" "$FILE"

      - name: Commit cask update to main
        run: |
          git config user.name "noetica-bot"
          git config user.email "noetica-bot@users.noreply.github.com"
          git add Casks/noetica.rb
          git diff --staged --quiet || git commit -m "cask: noetica ${{ steps.asset.outputs.version }}"
          git push

      - name: Checkout homebrew tap
        if: ${{ vars.TAP_REPO != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.TAP_REPO }}
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Update tap Cask formula
        if: ${{ vars.TAP_REPO != '' }}
        run: |
          FILE=tap/Casks/noetica.rb
          VERSION=${{ steps.asset.outputs.version }}
          SHA256=${{ steps.asset.outputs.sha256 }}
          URL=${{ steps.asset.outputs.url }}
          sed -i "s|version \".*\"|version \"$VERSION\"|g" "$FILE"
          sed -i "s|sha256 \".*\"|sha256 \"$SHA256\"|g" "$FILE"
          sed -i "s|url \".*\"|url \"$URL\"|g" "$FILE"

      - name: Commit tap update
        if: ${{ vars.TAP_REPO != '' }}
        working-directory: tap
        run: |
          git config user.name "noetica-bot"
          git config user.email "noetica-bot@users.noreply.github.com"
          git add Casks/noetica.rb
          git diff --staged --quiet || git commit -m "noetica ${{ steps.asset.outputs.version }}"
          git push
