name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-nightly.*"

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-latest
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: |
          npm ci
          # agent-machine deps (mammoth, pdf-parse, …) are needed for the root
          # typecheck, which includes agent-machine/**/*.ts via tsconfig.
          npm --prefix agent-machine ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Materialize Tauri icon
        run: npm run tauri:icon

      # ── Sidecar binaries ───────────────────────────────────────────────────
      # Build agent-machine and download Ollama before tauri build so that
      # externalBin entries resolve correctly when Tauri bundles the app.

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Add Intel Rust target for universal binary
        run: rustup target add x86_64-apple-darwin

      - name: Build agent-machine binary (universal)
        run: |
          npm run agent-machine:build:binary
          lipo -create \
            src-tauri/binaries/agent-machine-aarch64-apple-darwin \
            src-tauri/binaries/agent-machine-x86_64-apple-darwin \
            -output src-tauri/binaries/agent-machine-universal-apple-darwin
          chmod +x src-tauri/binaries/agent-machine-universal-apple-darwin
          echo "Universal agent-machine binary:"
          lipo -info src-tauri/binaries/agent-machine-universal-apple-darwin

      - name: Build noetica-embed sidecar (universal)
        # The Rust embedder (fastembed/ONNX) is injected as externalBin alongside agent-machine + ollama.
        # It was previously built only on the dev box → the universal release build failed with
        # "resource path binaries/noetica-embed-x86_64-apple-darwin doesn't exist". Build BOTH arches here.
        run: |
          mkdir -p src-tauri/binaries
          cargo build --release --manifest-path embed-sidecar/Cargo.toml --target aarch64-apple-darwin
          cargo build --release --manifest-path embed-sidecar/Cargo.toml --target x86_64-apple-darwin
          cp embed-sidecar/target/aarch64-apple-darwin/release/noetica-embed src-tauri/binaries/noetica-embed-aarch64-apple-darwin
          cp embed-sidecar/target/x86_64-apple-darwin/release/noetica-embed  src-tauri/binaries/noetica-embed-x86_64-apple-darwin
          lipo -create \
            src-tauri/binaries/noetica-embed-aarch64-apple-darwin \
            src-tauri/binaries/noetica-embed-x86_64-apple-darwin \
            -output src-tauri/binaries/noetica-embed-universal-apple-darwin
          chmod +x src-tauri/binaries/noetica-embed-aarch64-apple-darwin src-tauri/binaries/noetica-embed-x86_64-apple-darwin src-tauri/binaries/noetica-embed-universal-apple-darwin
          echo "Universal noetica-embed binary:"
          lipo -info src-tauri/binaries/noetica-embed-universal-apple-darwin

      - name: Download Ollama sidecar (universal)
        env:
          OLLAMA_VERSION: "0.30.8"
          TAURI_TARGET_TRIPLE: "universal-apple-darwin"
        run: bash scripts/download-sidecars.sh
        # The bundle ships only the `ollama` binary (for Tauri externalBin). The
        # COMPLETE runtime (binary + llama-server runner) is provisioned into
        # ~/.noetica/runtime at first boot by the agent-machine (managed-runtime),
        # so a runner is NOT required in the bundle — no runner-completeness gate here.

      - name: Inject sidecar externalBin into tauri.conf.json
        # The committed config is the dev default (no externalBin). Production builds
        # MUST inject it, otherwise the agent-machine + ollama sidecars are not
        # bundled and the app ships dead (the ~9MB-vs-~130MB DMG regression).
        run: node scripts/inject-am-sidecar-config.mjs

      # ── Code signing ───────────────────────────────────────────────────────
      # Import Apple Developer certificate when the secret is present.
      # When absent, tauri build proceeds unsigned and we ad-hoc sign afterward.

      - name: Import signing certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm certificate.p12

      - name: Export Apple signing env vars
        if: env.APPLE_CERTIFICATE != ''
        run: |
          echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}" >> "$GITHUB_ENV"
          echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> "$GITHUB_ENV"
          echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> "$GITHUB_ENV"

      - name: Build and publish release (universal)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOETICA_STATIC_EXPORT: "1"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Noetica ${{ github.ref_name }}"
          releaseBody: |
            ## Noetica ${{ github.ref_name }}

            Install via Homebrew (macOS, arm64 + x86_64):
            ```sh
            brew tap SocioProphet/noetica https://github.com/SocioProphet/Noetica
            brew install --cask noetica
            ```

            Or download the universal `.dmg` below.

            If Gatekeeper blocks the app:
            ```sh
            sudo xattr -dr com.apple.quarantine /Applications/Noetica.app
            ```
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, 'nightly') }}
          args: --target universal-apple-darwin

      # Ad-hoc sign the DMG when no Apple Developer cert is available.
      # This removes the broken signature that Gatekeeper silently rejects.
      - name: Ad-hoc sign DMG (no cert fallback)
        if: env.APPLE_CERTIFICATE == ''
        continue-on-error: true
        run: |
          DMG=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -1)
          [ -z "$DMG" ] && DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -1)
          if [ -n "$DMG" ]; then
            echo "Ad-hoc signing: $DMG"
            # Mount, strip broken sig from app, re-sign ad-hoc, repack
            MOUNT=$(hdiutil attach "$DMG" -nobrowse -quiet | awk '/Apple_HFS/ {print $NF}')
            APP=$(find "$MOUNT" -name "*.app" -maxdepth 1 | head -1)
            codesign --remove-signature "$APP" || true
            codesign --force --deep --sign - "$APP"
            hdiutil detach "$MOUNT" -quiet
            echo "Ad-hoc signing complete"
          fi

  release-linux:
    runs-on: ubuntu-latest
    needs: [release-macos]
    # Builds .deb/.rpm for both stable and nightly. (Ollama sidecar download was
    # 404ing — Ollama moved Linux packaging from .tgz to .tar.zst; fixed in
    # scripts/download-sidecars.sh.)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            rpm

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix agent-machine ci

      - name: Materialize Tauri icon
        run: npm run tauri:icon

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Build agent-machine binary (linux x64)
        run: npm run agent-machine:build:binary:linux

      - name: Download Ollama sidecar (linux)
        env:
          OLLAMA_VERSION: "0.30.8"
        run: bash scripts/download-sidecars.sh

      - name: Inject sidecar externalBin into tauri.conf.json
        run: node scripts/inject-am-sidecar-config.mjs

      - name: Build Tauri (deb + rpm)
        env:
          NOETICA_STATIC_EXPORT: "1"
        run: npx tauri build --bundles deb,rpm

      - name: Upload Linux packages to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.ref_name }}
          find src-tauri/target/release/bundle \( -name "*.deb" -o -name "*.rpm" \) \
            | xargs gh release upload "$TAG" --clobber

  update-cask:
    needs: release-macos
    runs-on: ubuntu-latest
    steps:
      - name: Wait for release asset propagation
        run: sleep 60

      - name: Resolve DMG download URL and SHA256
        id: asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ needs.release-macos.outputs.version }}
          TAG=${{ github.ref_name }}

          # Retry asset resolution — the dmg can take a moment to propagate after
          # tauri-action publishes the release.
          DMG_URL=""
          for attempt in 1 2 3 4 5 6; do
            DMG_URL=$(gh release view "$TAG" \
              --repo "${{ github.repository }}" \
              --json assets \
              --jq '.assets[] | select(.name | endswith(".dmg")) | .url' \
              | head -1)
            [ -n "$DMG_URL" ] && break
            echo "dmg not found yet (attempt $attempt) — waiting 20s"; sleep 20
          done

          # Complete-or-fail: never commit a half-populated cask (version set but
          # url/sha empty = broken `brew install`). Fail loudly instead.
          if [ -z "$DMG_URL" ]; then
            echo "::error::No .dmg asset found for $TAG after retries — refusing to write an incomplete cask"
            exit 1
          fi

          curl -fsSL "$DMG_URL" -o noetica.dmg
          SHA256=$(shasum -a 256 noetica.dmg | awk '{print $1}')
          if [ -z "$SHA256" ]; then
            echo "::error::Failed to compute dmg sha256 — refusing to write an incomplete cask"
            exit 1
          fi
          echo "url=$DMG_URL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "DMG URL: $DMG_URL"
          echo "SHA256:  $SHA256"

      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update cask (stable → noetica, nightly → noetica-nightly)
        run: |
          TAG=${{ github.ref_name }}
          if [[ "$TAG" == *nightly* ]]; then FILE=Casks/noetica-nightly.rb; else FILE=Casks/noetica.rb; fi
          # Version comes from the tag (so each nightly is a distinct brew upgrade);
          # url/sha come from the just-published release asset.
          VERSION=${TAG#v}
          SHA256=${{ steps.asset.outputs.sha256 }}
          URL=${{ steps.asset.outputs.url }}
          if [ -z "$SHA256" ] || [ -z "$URL" ]; then
            echo "::error::cask url/sha empty — aborting (the resolve step should have failed first)"
            exit 1
          fi
          sed -i "s|version \".*\"|version \"$VERSION\"|g" "$FILE"
          sed -i "s|sha256 \".*\"|sha256 \"$SHA256\"|g" "$FILE"
          sed -i "s|url \".*\"|url \"$URL\"|g" "$FILE"
          echo "CASK_FILE=$FILE" >> "$GITHUB_ENV"

      - name: Commit cask update to main
        run: |
          git config user.name "noetica-bot"
          git config user.email "noetica-bot@users.noreply.github.com"
          git add "$CASK_FILE"
          git diff --staged --quiet || git commit -m "cask: $(basename "$CASK_FILE" .rb) ${{ github.ref_name }}"
          git push

      - name: Checkout homebrew tap
        if: ${{ vars.TAP_REPO != '' }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ vars.TAP_REPO }}
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Update tap Cask formula
        if: ${{ vars.TAP_REPO != '' }}
        continue-on-error: true   # secondary channel — never fail the release on the tap
        run: |
          # Copy the cask we just updated on main into the tap, creating it if the tap
          # doesn't have it yet (the previous sed-in-place failed when the file was
          # absent). $CASK_FILE is the stable/nightly cask path set above.
          mkdir -p "tap/$(dirname "$CASK_FILE")"
          cp "$CASK_FILE" "tap/$CASK_FILE"

      - name: Commit tap update
        if: ${{ vars.TAP_REPO != '' }}
        continue-on-error: true
        working-directory: tap
        run: |
          git config user.name "noetica-bot"
          git config user.email "noetica-bot@users.noreply.github.com"
          git add Casks
          git diff --staged --quiet || git commit -m "noetica ${{ github.ref_name }}"
          git push
