name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-nightly.*"

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-latest
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: |
          npm ci
          # agent-machine deps (mammoth, pdf-parse, …) are needed for the root
          # typecheck, which includes agent-machine/**/*.ts via tsconfig.
          npm --prefix agent-machine ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Materialize Tauri icon
        run: npm run tauri:icon

      # ── Sidecar binaries ───────────────────────────────────────────────────
      # Build agent-machine and download Ollama before tauri build so that
      # externalBin entries resolve correctly when Tauri bundles the app.

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Add Intel Rust target for universal binary
        run: rustup target add x86_64-apple-darwin

      - name: Build agent-machine binary (universal)
        run: |
          npm run agent-machine:build:binary
          lipo -create \
            src-tauri/binaries/agent-machine-aarch64-apple-darwin \
            src-tauri/binaries/agent-machine-x86_64-apple-darwin \
            -output src-tauri/binaries/agent-machine-universal-apple-darwin
          chmod +x src-tauri/binaries/agent-machine-universal-apple-darwin
          echo "Universal agent-machine binary:"
          lipo -info src-tauri/binaries/agent-machine-universal-apple-darwin

      - name: Build noetica-embed sidecar (universal)
        # The Rust embedder (fastembed/ONNX) is injected as externalBin alongside agent-machine + ollama.
        # It was previously built only on the dev box → the universal release build failed with
        # "resource path binaries/noetica-embed-x86_64-apple-darwin doesn't exist". Build BOTH arches here.
        run: |
          mkdir -p src-tauri/binaries
          cargo build --release --manifest-path embed-sidecar/Cargo.toml --target aarch64-apple-darwin
          cargo build --release --manifest-path embed-sidecar/Cargo.toml --target x86_64-apple-darwin
          cp embed-sidecar/target/aarch64-apple-darwin/release/noetica-embed src-tauri/binaries/noetica-embed-aarch64-apple-darwin
          cp embed-sidecar/target/x86_64-apple-darwin/release/noetica-embed  src-tauri/binaries/noetica-embed-x86_64-apple-darwin
          lipo -create \
            src-tauri/binaries/noetica-embed-aarch64-apple-darwin \
            src-tauri/binaries/noetica-embed-x86_64-apple-darwin \
            -output src-tauri/binaries/noetica-embed-universal-apple-darwin
          chmod +x src-tauri/binaries/noetica-embed-aarch64-apple-darwin src-tauri/binaries/noetica-embed-x86_64-apple-darwin src-tauri/binaries/noetica-embed-universal-apple-darwin
          echo "Universal noetica-embed binary:"
          lipo -info src-tauri/binaries/noetica-embed-universal-apple-darwin

      - name: Build noetica-operator sidecar (universal)
        # The neural-operator sidecar now uses `tract` (pure-Rust ONNX) — no prebuilt binary, so it
        # cross-compiles cleanly to BOTH arches (this is what unblocked bundling after `ort` had no
        # x86_64-apple-darwin prebuilt). Same both-arch-then-lipo dance the embedder needs.
        run: |
          mkdir -p src-tauri/binaries
          cargo build --release --manifest-path operator-sidecar/Cargo.toml --target aarch64-apple-darwin
          cargo build --release --manifest-path operator-sidecar/Cargo.toml --target x86_64-apple-darwin
          cp operator-sidecar/target/aarch64-apple-darwin/release/noetica-operator src-tauri/binaries/noetica-operator-aarch64-apple-darwin
          cp operator-sidecar/target/x86_64-apple-darwin/release/noetica-operator  src-tauri/binaries/noetica-operator-x86_64-apple-darwin
          lipo -create \
            src-tauri/binaries/noetica-operator-aarch64-apple-darwin \
            src-tauri/binaries/noetica-operator-x86_64-apple-darwin \
            -output src-tauri/binaries/noetica-operator-universal-apple-darwin
          chmod +x src-tauri/binaries/noetica-operator-aarch64-apple-darwin src-tauri/binaries/noetica-operator-x86_64-apple-darwin src-tauri/binaries/noetica-operator-universal-apple-darwin
          echo "Universal noetica-operator binary:"
          lipo -info src-tauri/binaries/noetica-operator-universal-apple-darwin

      - name: Download Ollama sidecar (universal)
        env:
          OLLAMA_VERSION: "0.30.8"
          TAURI_TARGET_TRIPLE: "universal-apple-darwin"
        run: bash scripts/download-sidecars.sh
        # The bundle ships only the `ollama` binary (for Tauri externalBin). The
        # COMPLETE runtime (binary + llama-server runner) is provisioned into
        # ~/.noetica/runtime at first boot by the agent-machine (managed-runtime),
        # so a runner is NOT required in the bundle — no runner-completeness gate here.

      - name: Inject sidecar externalBin into tauri.conf.json
        # The committed config is the dev default (no externalBin). Production builds
        # MUST inject it, otherwise the agent-machine + ollama sidecars are not
        # bundled and the app ships dead (the ~9MB-vs-~130MB DMG regression).
        run: node scripts/inject-am-sidecar-config.mjs

      # ── Code signing ───────────────────────────────────────────────────────
      # Import Apple Developer certificate when the secret is present.
      # When absent, tauri build proceeds unsigned and we ad-hoc sign afterward.

      - name: Import signing certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm certificate.p12

      - name: Export Apple signing env vars
        if: env.APPLE_CERTIFICATE != ''
        run: |
          echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}" >> "$GITHUB_ENV"
          echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> "$GITHUB_ENV"
          echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> "$GITHUB_ENV"

      - name: Build and publish release (universal)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOETICA_STATIC_EXPORT: "1"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Noetica ${{ github.ref_name }}"
          releaseBody: |
            ## Noetica ${{ github.ref_name }}

            Install via Homebrew (macOS, arm64 + x86_64):
            ```sh
            brew install --cask SocioProphet/tap/noetica
            # nightlies: brew install --cask SocioProphet/tap/noetica-nightly
            ```

            Or download the universal `.dmg` below.

            If Gatekeeper blocks the app:
            ```sh
            sudo xattr -dr com.apple.quarantine /Applications/Noetica.app
            ```
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, 'nightly') }}
          args: --target universal-apple-darwin

      # Notarize + STAPLE the DMG so Gatekeeper clears it on first launch with no `xattr -dr quarantine`
      # workaround. tauri-action notarizes the .app during build when APPLE_ID/PASSWORD/TEAM_ID are set (they're
      # exported above); this staples the ticket onto the DMG so an OFFLINE first launch passes too. Runs only
      # when Apple credentials are configured; continue-on-error so an Apple-service hiccup can't block a release.
      - name: Notarize + staple DMG
        if: env.APPLE_CERTIFICATE != ''
        continue-on-error: true
        run: |
          DMG=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -1)
          [ -z "$DMG" ] && DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -1)
          if [ -z "$DMG" ]; then echo "::warning::no DMG found to notarize"; exit 0; fi
          echo "Notarizing $DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 30m
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG" && echo "Notarized + stapled OK"

      # Ad-hoc sign the DMG when no Apple Developer cert is available.
      # This removes the broken signature that Gatekeeper silently rejects.
      - name: Ad-hoc sign DMG (no cert fallback)
        if: env.APPLE_CERTIFICATE == ''
        continue-on-error: true
        run: |
          DMG=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -1)
          [ -z "$DMG" ] && DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -1)
          if [ -n "$DMG" ]; then
            echo "Ad-hoc signing: $DMG"
            # Mount, strip broken sig from app, re-sign ad-hoc, repack
            MOUNT=$(hdiutil attach "$DMG" -nobrowse -quiet | awk '/Apple_HFS/ {print $NF}')
            APP=$(find "$MOUNT" -name "*.app" -maxdepth 1 | head -1)
            codesign --remove-signature "$APP" || true
            codesign --force --deep --sign - "$APP"
            hdiutil detach "$MOUNT" -quiet
            echo "Ad-hoc signing complete"
          fi

  release-linux:
    runs-on: ubuntu-latest
    needs: [release-macos]
    # Builds .deb/.rpm for both stable and nightly. (Ollama sidecar download was
    # 404ing — Ollama moved Linux packaging from .tgz to .tar.zst; fixed in
    # scripts/download-sidecars.sh.)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            rpm

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix agent-machine ci

      - name: Materialize Tauri icon
        run: npm run tauri:icon

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Build agent-machine binary (linux x64)
        run: npm run agent-machine:build:binary:linux

      - name: Build noetica-embed sidecar (linux x64)
        # Same fix as macOS: noetica-embed is an injected externalBin, so the Linux universal build aborts
        # with "resource path binaries/noetica-embed-x86_64-unknown-linux-gnu doesn't exist" without this.
        run: |
          mkdir -p src-tauri/binaries
          cargo build --release --manifest-path embed-sidecar/Cargo.toml --target x86_64-unknown-linux-gnu
          cp embed-sidecar/target/x86_64-unknown-linux-gnu/release/noetica-embed src-tauri/binaries/noetica-embed-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/noetica-embed-x86_64-unknown-linux-gnu

      - name: Build noetica-operator sidecar (linux x64)
        # Pure-Rust tract → builds natively here; injected externalBin alongside noetica-embed.
        run: |
          mkdir -p src-tauri/binaries
          cargo build --release --manifest-path operator-sidecar/Cargo.toml --target x86_64-unknown-linux-gnu
          cp operator-sidecar/target/x86_64-unknown-linux-gnu/release/noetica-operator src-tauri/binaries/noetica-operator-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/noetica-operator-x86_64-unknown-linux-gnu

      - name: Download Ollama sidecar (linux)
        env:
          OLLAMA_VERSION: "0.30.8"
        run: bash scripts/download-sidecars.sh

      - name: Inject sidecar externalBin into tauri.conf.json
        run: node scripts/inject-am-sidecar-config.mjs

      - name: Build Tauri (deb + rpm)
        env:
          NOETICA_STATIC_EXPORT: "1"
        run: npx tauri build --bundles deb,rpm

      - name: Upload Linux packages to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.ref_name }}
          find src-tauri/target/release/bundle \( -name "*.deb" -o -name "*.rpm" \) \
            | xargs gh release upload "$TAG" --clobber

  release-windows:
    runs-on: windows-latest
    needs: [release-macos]
    # Builds the Windows NSIS installer (.exe) for stable + nightly and uploads it to the same
    # release the macOS job creates — so every nightly cuts mac + linux + windows together.
    # Unsigned: Windows SmartScreen warns once on first run ("More info → Run anyway").
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix agent-machine ci

      - name: Materialize Tauri icon
        run: npm run tauri:icon

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Build agent-machine binary (windows x64)
        run: npm run agent-machine:build:binary:windows

      - name: Build noetica-embed sidecar (windows x64)
        # Injected externalBin — build it so Tauri resolves binaries/noetica-embed for the windows
        # target (the committed macOS binary would otherwise leave the required .exe missing).
        shell: bash
        run: |
          cargo build --release --manifest-path embed-sidecar/Cargo.toml --target x86_64-pc-windows-msvc
          cp embed-sidecar/target/x86_64-pc-windows-msvc/release/noetica-embed.exe src-tauri/binaries/noetica-embed-x86_64-pc-windows-msvc.exe

      - name: Build noetica-operator sidecar (windows x64)
        # Pure-Rust tract → cross-compiles cleanly; injected externalBin alongside noetica-embed.
        shell: bash
        run: |
          cargo build --release --manifest-path operator-sidecar/Cargo.toml --target x86_64-pc-windows-msvc
          cp operator-sidecar/target/x86_64-pc-windows-msvc/release/noetica-operator.exe src-tauri/binaries/noetica-operator-x86_64-pc-windows-msvc.exe

      - name: Download Ollama sidecar (windows)
        shell: pwsh
        run: |
          $ver = "0.30.8"
          Invoke-WebRequest "https://github.com/ollama/ollama/releases/download/v$ver/ollama-windows-amd64.zip" -OutFile ollama.zip
          Expand-Archive ollama.zip -DestinationPath ollama-win -Force
          Copy-Item (Get-ChildItem -Recurse ollama-win -Filter ollama.exe | Select-Object -First 1).FullName src-tauri/binaries/ollama-x86_64-pc-windows-msvc.exe

      - name: Inject sidecar externalBin into tauri.conf.json
        run: node scripts/inject-am-sidecar-config.mjs

      - name: Build Tauri (nsis)
        env:
          NOETICA_STATIC_EXPORT: "1"
        run: npx tauri build --bundles nsis

      - name: Upload Windows installer to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.ref_name }}
          find src-tauri/target/release/bundle/nsis -name "*.exe" | xargs gh release upload "$TAG" --clobber

  update-winget:
    # winget = the brew-cask loop for Windows: `winget install SocioProphet.Noetica` /
    # `winget upgrade` and you're current. STABLE tags only — winget-pkgs moderation is
    # not the place for daily nightlies. The installer is UNSIGNED for now (free OSS
    # signing via SignPath Foundation = backlog; the repo is public so it qualifies) —
    # winget accepts unsigned installers, at the cost of first-run Defender friction.
    # NOTE the FIRST-EVER submission of the package is a one-time step done outside CI
    # (author manifests + PR microsoft/winget-pkgs); this job then owns every update.
    needs: release-windows
    if: ${{ !contains(github.ref_name, 'nightly') && !contains(github.ref_name, '-windows') }}
    runs-on: windows-latest
    steps:
      - name: Submit winget manifest update
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WINGET_PAT: ${{ secrets.RELEASE_PAT || secrets.TAP_GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          # Resolve the freshly-uploaded NSIS asset from the release itself — no hardcoded name.
          $exe = (gh release view $tag --repo ${{ github.repository }} --json assets --jq '.assets[].name') -split "`n" | Where-Object { $_ -like "*.exe" } | Select-Object -First 1
          if (-not $exe) { Write-Error "no .exe asset on $tag"; exit 1 }
          $url = "https://github.com/${{ github.repository }}/releases/download/$tag/$exe"
          Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          .\wingetcreate.exe update SocioProphet.Noetica --version $version --urls $url --submit --token $env:WINGET_PAT

  update-cask:
    needs: release-macos
    runs-on: ubuntu-latest
    steps:
      - name: Wait for release asset propagation
        run: sleep 60

      - name: Resolve DMG download URL and SHA256
        id: asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ needs.release-macos.outputs.version }}
          TAG=${{ github.ref_name }}

          # Retry asset resolution — the dmg can take a moment to propagate after
          # tauri-action publishes the release.
          DMG_URL=""
          for attempt in 1 2 3 4 5 6; do
            DMG_URL=$(gh release view "$TAG" \
              --repo "${{ github.repository }}" \
              --json assets \
              --jq '.assets[] | select(.name | endswith(".dmg")) | .url' \
              | head -1)
            [ -n "$DMG_URL" ] && break
            echo "dmg not found yet (attempt $attempt) — waiting 20s"; sleep 20
          done

          # Complete-or-fail: never commit a half-populated cask (version set but
          # url/sha empty = broken `brew install`). Fail loudly instead.
          if [ -z "$DMG_URL" ]; then
            echo "::error::No .dmg asset found for $TAG after retries — refusing to write an incomplete cask"
            exit 1
          fi

          curl -fsSL "$DMG_URL" -o noetica.dmg
          SHA256=$(shasum -a 256 noetica.dmg | awk '{print $1}')
          if [ -z "$SHA256" ]; then
            echo "::error::Failed to compute dmg sha256 — refusing to write an incomplete cask"
            exit 1
          fi
          echo "url=$DMG_URL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "DMG URL: $DMG_URL"
          echo "SHA256:  $SHA256"

      # The homebrew tap (vars.TAP_REPO = SocioProphet/homebrew-tap → `socioprophet/tap`) is the ONE
      # canonical cask home. We used to ALSO commit casks into this repo's Casks/ dir, which made the app
      # repo a second tap (`socioprophet/noetica`) — so `brew … noetica[-nightly]` was ambiguous across
      # two taps. That in-repo publish is gone; the tap is the single source of truth.
      - name: Checkout homebrew tap (canonical cask home)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ vars.TAP_REPO }}
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Update + publish cask to the tap (stable → noetica, nightly → noetica-nightly)
        working-directory: tap
        run: |
          TAG=${{ github.ref_name }}
          if [[ "$TAG" == *nightly* ]]; then FILE=Casks/noetica-nightly.rb; else FILE=Casks/noetica.rb; fi
          # Version comes from the tag (so each nightly is a distinct brew upgrade);
          # url/sha come from the just-published release asset.
          VERSION=${TAG#v}
          SHA256=${{ steps.asset.outputs.sha256 }}
          URL=${{ steps.asset.outputs.url }}
          if [ -z "$SHA256" ] || [ -z "$URL" ]; then
            echo "::error::cask url/sha empty — aborting (the resolve step should have failed first)"
            exit 1
          fi
          if [ ! -f "$FILE" ]; then
            echo "::error::$FILE missing in tap ${{ vars.TAP_REPO }} — cannot update"; exit 1
          fi
          sed -i "s|version \".*\"|version \"$VERSION\"|g" "$FILE"
          sed -i "s|sha256 \".*\"|sha256 \"$SHA256\"|g" "$FILE"
          sed -i "s|url \".*\"|url \"$URL\"|g" "$FILE"
          git config user.name "noetica-bot"
          git config user.email "noetica-bot@users.noreply.github.com"
          git add "$FILE"
          git diff --staged --quiet || git commit -m "noetica: $(basename "$FILE" .rb) $TAG"
          git push

  # Attach the knowledge brains so a fresh install auto-loads them: lib/brain-provision.ts defaults to
  # the release asset .../releases/latest/download/<name>-brain.tar.gz. The brains are too large to BUILD
  # in CI, so they're produced once with scripts/package-brains.sh, hosted at a stable URL, and MIRRORED
  # onto each stable release here. Configure repo vars BRAIN_ACADEMIC_URL / BRAIN_OPS_URL with those URLs;
  # the job SKIPS cleanly when unset, so it never breaks a release, and runs on stable tags only (which is
  # what "latest/download" points to — no 1.5GB mirror on every nightly).
  attach-brains:
    needs: release-macos
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, 'nightly') && (vars.BRAIN_ACADEMIC_URL != '' || vars.BRAIN_OPS_URL != '') }}
    steps:
      - name: Mirror brain artifacts onto the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACADEMIC_URL: ${{ vars.BRAIN_ACADEMIC_URL }}
          OPS_URL: ${{ vars.BRAIN_OPS_URL }}
        run: |
          set -euo pipefail
          TAG=${{ github.ref_name }}
          mirror() {  # <name> <source-url>
            local name="$1" src="$2"
            if [ -z "$src" ]; then echo "no source URL for the $name brain — skipping"; return; fi
            echo "downloading $name brain from $src"
            curl -fSL --retry 3 "$src" -o "${name}-brain.tar.gz"
            echo "  $(du -h "${name}-brain.tar.gz" | awk '{print $1}'), sha256 $(sha256sum "${name}-brain.tar.gz" | awk '{print $1}')"
            gh release upload "$TAG" "${name}-brain.tar.gz" --clobber --repo "${{ github.repository }}"
            echo "uploaded ${name}-brain.tar.gz to $TAG"
          }
          mirror academic "$ACADEMIC_URL"
          mirror operational "$OPS_URL"
