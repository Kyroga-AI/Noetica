name: SourceOS Contract Sync

on:
  pull_request:
    branches: ["main"]
    paths:
      - "lib/contracts/sourceos/generated/sourceos-interaction-event.ts"
      - "scripts/sync-sourceos-contracts.mjs"
      - ".github/workflows/sourceos-contract-sync.yml"
  push:
    branches: ["main", "work/sourceos-contract-sync"]
    paths:
      - "lib/contracts/sourceos/generated/sourceos-interaction-event.ts"
      - "scripts/sync-sourceos-contracts.mjs"
      - ".github/workflows/sourceos-contract-sync.yml"

permissions:
  contents: read

jobs:
  check-sourceos-contract-sync:
    name: Check SourceOS contract sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Check vendored SourceOS contracts
        run: node scripts/sync-sourceos-contracts.mjs --check
