name: validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  nextjs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          npm install
          # Root tsconfig includes agent-machine/**/*.ts, so typecheck and
          # next build need agent-machine's deps (mammoth, pdf-parse, …).
          npm --prefix agent-machine install
      - name: CLI doctor
        run: npm run cli:doctor
      - name: CLI smoke
        run: npm run cli:smoke
      - name: SourceOS interaction export path check
        run: npm run sourceos:events:path:check
      - name: SourceOS interaction artifact export
        run: npm run sourceos:events:export
      - name: Tauri icon materializer
        run: |
          npm run tauri:icon
          node -e "const fs=require('fs'); const b=fs.readFileSync('src-tauri/icons/icon.png'); const sig='89504e470d0a1a0a'; if (b.subarray(0,8).toString('hex') !== sig) { throw new Error('src-tauri/icons/icon.png is not a PNG'); }"
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests (router contract, value-judgment, capability, pricing)
        run: |
          npm --prefix agent-machine install
          npm test
      - name: Integration tests (live HTTP surface, no Ollama)
        run: npm --prefix agent-machine run test:integration
      - name: Integration tests (RocksDB persistence + auth gate)
        run: npm --prefix agent-machine run test:integration:rocks
      # The fallback suite's RAG-injection test needs the embedder sidecar (noetica-embed); without
      # the compiled binary semantic retrieval is dead and the test flakes. Build it (cached) first.
      - name: Cache Rust (embedder)
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: embed-sidecar
      - name: Build embedder (noetica-embed) for the RAG integration test
        run: cargo build --release --manifest-path embed-sidecar/Cargo.toml
      - name: Integration tests (Ollama broken-primary fallback)
        run: npm --prefix agent-machine run test:integration:fallback
      - name: Engine version sync (hellgraph pin parity across manifests)
        run: node scripts/check-engine-version.mjs
      - name: Build
        run: npm run build
      - name: Static export probe
        run: npm run build:static:probe
      - name: Packaging metadata validation
        run: npm run packaging:validate
      - name: Upload static export probe artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: static-export-probe
          path: artifacts/

  tauri-rust-macos:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b
        with:
          toolchain: stable
      - name: Materialize Tauri context inputs
        run: |
          npm run tauri:icon
          mkdir -p out
          touch out/.ci-tauri-rust-check-placeholder
          file src-tauri/icons/icon.png
          test -d out
      - name: Tauri Rust lockfile
        working-directory: src-tauri
        run: cargo generate-lockfile
      - name: Tauri Rust check diagnostics
        working-directory: src-tauri
        run: |
          set +e
          cargo check --locked > ../tauri-rust-check.log 2>&1
          status=$?
          echo "cargo-check-exit=$status"
          tail -n 80 ../tauri-rust-check.log
          exit $status
      - name: Upload Tauri Rust check log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tauri-rust-check-log
          path: tauri-rust-check.log

  tauri-macos:
    runs-on: macos-latest
    needs:
      - tauri-rust-macos
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b
        with:
          toolchain: stable
      - name: Install dependencies
        run: |
          npm install
          # Root tsconfig includes agent-machine/**/*.ts, so typecheck and
          # next build need agent-machine's deps (mammoth, pdf-parse, …).
          npm --prefix agent-machine install
      - name: Tauri icon materializer
        run: |
          npm run tauri:icon
          test -f src-tauri/icons/icon.png
          file src-tauri/icons/icon.png
      - name: Static Next build for Tauri
        run: npm run build:static
      - name: Verify static output for Tauri
        run: test -f out/index.html
      - name: Tauri Rust lockfile
        working-directory: src-tauri
        run: cargo generate-lockfile
      - name: Tauri Rust check
        working-directory: src-tauri
        run: cargo check --locked --quiet
      - name: Tauri static build feasibility
        # App-only bundle: this check verifies the build COMPILES + the .app bundles. DMG packaging
        # (hdiutil / bundle_dmg.sh) is flaky on hosted macOS runners and irrelevant to feasibility,
        # so we skip it here. Release.yml still produces the full DMG for actual distribution.
        run: npm run tauri:icon && npx tauri build --bundles app
