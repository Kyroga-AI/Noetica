ShortDescription: Self-hosted AI dialogue backend — 22-intent layer on localhost:8080
Description: |
  Noetica is a self-hosted AI dialogue management backend for sovereign,
  cloud-free AI inference.

  Features:
  - 22-intent dialogue routing (chat, explain, fix, codegen, review, plan, etc.)
  - HTTP API on localhost:8080 — /health, /api/chat, /api/intent, /api/complete
  - No cloud dependency — runs fully offline
  - Windows service via NSSM — auto-start on boot
  - TurtleTerm co-pilot integration: turtle-copilot use noetica
  - PowerShell management: Start-Noetica, Stop-Noetica, Get-NoeticalHealth
