<svg viewBox="0 0 900 588" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, sans-serif">
  <title>The agent as the user's digital twin ("the visor")</title>
  <desc>One organism: the user's knowledge coupled to agent state feeds the visor; organs (memory, knowledge, perception, action, transport, immune/skin, lifecycle, interface) map to concrete modules; tasks route by sensitivity to local/edge/cloud; data flows through a governed lifecycle.</desc>
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/></marker>
  </defs>
  <rect x="0" y="0" width="900" height="588" fill="#ffffff"/>
  <text x="450" y="22" text-anchor="middle" fill="#1e293b" font-weight="700" font-size="15">The Visor — one agent, your digital twin</text>

  <text x="450" y="46" text-anchor="middle" fill="#64748b" font-weight="600" letter-spacing="0.06em" font-size="9.5">COUPLING · DECISIONS RESHAPE KNOWLEDGE (COMPOUNDS)</text>
  <rect x="238" y="54" width="184" height="42" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.2"/>
  <text x="330" y="72" text-anchor="middle" fill="#1e293b" font-weight="700" font-size="12.5">Your Knowledge</text>
  <text x="330" y="87" text-anchor="middle" fill="#64748b" font-size="10">X_k · canon + graph</text>
  <rect x="478" y="54" width="184" height="42" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.2"/>
  <text x="570" y="72" text-anchor="middle" fill="#1e293b" font-weight="700" font-size="12.5">Agent State</text>
  <text x="570" y="87" text-anchor="middle" fill="#64748b" font-size="10">X_a · what the twin knows now</text>
  <path d="M422,75 L478,75" stroke="#cbd5e1" stroke-width="1.2" fill="none" marker-end="url(#ar)"/>
  <path d="M478,82 L422,82" stroke="#cbd5e1" stroke-width="1.2" fill="none" marker-end="url(#ar)"/>

  <path d="M450,96 L450,116" stroke="#cbd5e1" stroke-width="1.2" fill="none" marker-end="url(#ar)"/>
  <rect x="300" y="118" width="300" height="54" rx="10" fill="#6366f1" stroke="#4f46e5" stroke-width="1.4"/>
  <text x="450" y="140" text-anchor="middle" fill="#fff" font-weight="700" font-size="15">THE VISOR</text>
  <text x="450" y="158" text-anchor="middle" fill="#e0e7ff" font-size="10.5">the agent — perceived + acted through, not operated</text>

  <path d="M450,172 L450,190" stroke="#cbd5e1" stroke-width="1.2" fill="none"/>
  <path d="M122,190 L778,190" stroke="#cbd5e1" stroke-width="1.2" fill="none"/>
  <path d="M122,190 L122,206 M334,190 L334,206 M566,190 L566,206 M778,190 L778,206" stroke="#cbd5e1" stroke-width="1.2" fill="none"/>

  <g font-size="12">
    <rect x="24" y="206" width="196" height="60" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
    <circle cx="38" cy="220" r="4" fill="#6366f1"/><text x="120" y="226" text-anchor="middle" fill="#1e293b" font-weight="700">Memory</text>
    <text x="120" y="242" text-anchor="middle" fill="#64748b" font-size="9.5">living-KB · autoDream</text>
    <text x="120" y="256" text-anchor="middle" fill="#64748b" font-size="8.5">memory-layers · fs-store</text>
    <rect x="236" y="206" width="196" height="60" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
    <circle cx="250" cy="220" r="4" fill="#16a34a"/><text x="334" y="226" text-anchor="middle" fill="#1e293b" font-weight="700">Knowledge</text>
    <text x="334" y="242" text-anchor="middle" fill="#64748b" font-size="9.5">graph substrate</text>
    <text x="334" y="256" text-anchor="middle" fill="#64748b" font-size="8.5">hellgraph (on-device+svc)</text>
    <rect x="448" y="206" width="196" height="60" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
    <circle cx="462" cy="220" r="4" fill="#6366f1"/><text x="546" y="226" text-anchor="middle" fill="#1e293b" font-weight="700">Perception</text>
    <text x="546" y="242" text-anchor="middle" fill="#64748b" font-size="9.5">situate → embed</text>
    <text x="546" y="256" text-anchor="middle" fill="#64748b" font-size="8.5">contextual-ingest</text>
    <rect x="660" y="206" width="196" height="60" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
    <circle cx="674" cy="220" r="4" fill="#16a34a"/><text x="758" y="226" text-anchor="middle" fill="#1e293b" font-weight="700">Action</text>
    <text x="758" y="242" text-anchor="middle" fill="#64748b" font-size="9.5">deploy · operate</text>
    <text x="758" y="256" text-anchor="middle" fill="#64748b" font-size="8.5">continuum · prophet-cli</text>
  </g>
  <g font-size="12">
    <rect x="24" y="276" width="196" height="60" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
    <circle cx="38" cy="290" r="4" fill="none" stroke="#94a3b8" stroke-width="1.3"/><text x="120" y="296" text-anchor="middle" fill="#1e293b" font-weight="700">Transport</text>
    <text x="120" y="312" text-anchor="middle" fill="#64748b" font-size="9.5">circulatory · nervous</text>
    <text x="120" y="326" text-anchor="middle" fill="#64748b" font-size="8.5">TriRPC envelope</text>
    <rect x="236" y="276" width="196" height="60" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
    <circle cx="250" cy="290" r="4" fill="none" stroke="#94a3b8" stroke-width="1.3"/><text x="334" y="296" text-anchor="middle" fill="#1e293b" font-weight="700">Immune / Skin</text>
    <text x="334" y="312" text-anchor="middle" fill="#64748b" font-size="9.5">zero-trust · enclave</text>
    <text x="334" y="326" text-anchor="middle" fill="#64748b" font-size="8.5">isolation-policy · SPIFFE</text>
    <rect x="448" y="276" width="196" height="60" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
    <circle cx="462" cy="290" r="4" fill="none" stroke="#94a3b8" stroke-width="1.3"/><text x="546" y="296" text-anchor="middle" fill="#1e293b" font-weight="700">Lifecycle</text>
    <text x="546" y="312" text-anchor="middle" fill="#64748b" font-size="9.5">intent DAG · MLOps</text>
    <text x="546" y="326" text-anchor="middle" fill="#64748b" font-size="8.5">INCEPTION→GENESIS→SYSTEM</text>
    <rect x="660" y="276" width="196" height="60" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
    <circle cx="674" cy="290" r="4" fill="#16a34a"/><text x="758" y="296" text-anchor="middle" fill="#1e293b" font-weight="700">Interface</text>
    <text x="758" y="312" text-anchor="middle" fill="#64748b" font-size="9.5">the visor's lens</text>
    <text x="758" y="326" text-anchor="middle" fill="#64748b" font-size="8.5">Noetica cockpit</text>
  </g>

  <text x="24" y="370" fill="#64748b" font-weight="600" letter-spacing="0.06em" font-size="9.5">ISOLATION · ROUTE BY DATA-SENSITIVITY (LEAKAGE PREVENTION)</text>
  <rect x="24" y="378" width="150" height="48" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="99" y="398" text-anchor="middle" fill="#1e293b" font-weight="700" font-size="11.5">Task Analyzer</text>
  <text x="99" y="413" text-anchor="middle" fill="#64748b" font-size="9">classify sensitivity</text>
  <path d="M174,402 L206,402" stroke="#cbd5e1" stroke-width="1.2" fill="none" marker-end="url(#ar)"/>
  <rect x="208" y="378" width="210" height="48" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
  <rect x="208" y="378" width="5" height="48" rx="2" fill="#dc2626"/>
  <text x="318" y="398" text-anchor="middle" fill="#1e293b" font-weight="700" font-size="11.5">Local · on-device</text>
  <text x="318" y="413" text-anchor="middle" fill="#64748b" font-size="9">high-sensitive</text>
  <rect x="426" y="378" width="210" height="48" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
  <rect x="426" y="378" width="5" height="48" rx="2" fill="#d97706"/>
  <text x="536" y="398" text-anchor="middle" fill="#1e293b" font-weight="700" font-size="11.5">Edge</text>
  <text x="536" y="413" text-anchor="middle" fill="#64748b" font-size="9">medium-sensitive</text>
  <rect x="644" y="378" width="212" height="48" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
  <rect x="644" y="378" width="5" height="48" rx="2" fill="#16a34a"/>
  <text x="753" y="398" text-anchor="middle" fill="#1e293b" font-weight="700" font-size="11.5">Cloud</text>
  <text x="753" y="413" text-anchor="middle" fill="#64748b" font-size="9">low-sensitive</text>

  <text x="24" y="456" fill="#64748b" font-weight="600" letter-spacing="0.06em" font-size="9.5">DATA LIFECYCLE · EVERY BYTE GOVERNED</text>
  <rect x="24" y="464" width="832" height="40" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="440" y="488" text-anchor="middle" fill="#64748b" font-size="10.5">Ingest → Normalize (hash·encrypt·label) → Extract → Index → Serve → Retain / Legal-hold / TTL·GC / Delete</text>

  <g font-size="9.5">
    <circle cx="30" cy="528" r="4" fill="#16a34a"/><text x="40" y="531" fill="#64748b">live</text>
    <circle cx="92" cy="528" r="4" fill="#6366f1"/><text x="102" y="531" fill="#64748b">built</text>
    <circle cx="226" cy="528" r="4" fill="none" stroke="#94a3b8" stroke-width="1.3"/><text x="236" y="531" fill="#64748b">seam / planned</text>
    <text x="600" y="531" fill="#64748b" text-anchor="end">isolation left-bar:</text>
    <rect x="606" y="524" width="10" height="8" fill="#dc2626"/><text x="620" y="531" fill="#64748b">high</text>
    <rect x="648" y="524" width="10" height="8" fill="#d97706"/><text x="662" y="531" fill="#64748b">med</text>
    <rect x="690" y="524" width="10" height="8" fill="#16a34a"/><text x="704" y="531" fill="#64748b">low</text>
  </g>
</svg>
