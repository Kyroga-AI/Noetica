name: Package & Publish

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:

jobs:
  linux-deb:
    name: Linux .deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set version
        run: |
          VERSION="${{ github.ref_name }}"
          echo "PKG_VERSION=${VERSION#v}" >> $GITHUB_ENV
      - name: Install build deps
        run: |
          sudo apt-get install -y dpkg-dev rsync
          sudo apt-get install -y nodejs npm || true
      - name: Build .deb
        run: |
          cd packaging/linux/deb
          bash build-deb.sh "${{ env.PKG_VERSION }}" "amd64"
      - uses: actions/upload-artifact@v4
        with:
          name: noetica-deb
          path: packaging/linux/deb/noetica_*.deb

  chocolatey:
    name: Chocolatey .nupkg
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set version
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          echo "PKG_VERSION=${VERSION#v}" >> $GITHUB_ENV
      - name: Pack
        shell: powershell
        run: |
          $nuspec = "packaging/chocolatey/noetica/noetica.nuspec"
          (Get-Content $nuspec) -replace '<version>.*</version>', "<version>${{ env.PKG_VERSION }}</version>" | Set-Content $nuspec
          cd packaging/chocolatey/noetica
          choco pack
      - uses: actions/upload-artifact@v4
        with:
          name: noetica-nupkg
          path: packaging/chocolatey/noetica/*.nupkg

  windows-service-zip:
    name: Windows service zip
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set version
        shell: bash
        run: echo "PKG_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
      - name: Install deps + bundle
        shell: powershell
        run: |
          npm install --production 2>$null
          $exclude = @('.git','node_modules\.cache','.gitea','.github','packaging')
          $files = Get-ChildItem -Recurse | Where-Object {
            $rel = $_.FullName.Replace("$PWD\","")
            -not ($exclude | Where-Object { $rel.StartsWith($_) })
          }
          $zipName = "noetica-win64.zip"
          Compress-Archive -Path @('app','lib','config','package.json','package-lock.json','index.js','server.js') `
            -DestinationPath $zipName -ErrorAction SilentlyContinue
          if (-not (Test-Path $zipName)) {
            # FAIL rather than fall back to zipping the whole tree — a blanket zip would sweep in
            # developer/runtime data (.noetica chat brain, .env secrets). A failed build beats a leak.
            Write-Error "curated package zip was not produced (missing app/lib/server.js?) — refusing a full-tree fallback zip"
            exit 1
          }
      - uses: actions/upload-artifact@v4
        with:
          name: noetica-win64-zip
          path: noetica-win64.zip
